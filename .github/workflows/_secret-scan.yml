name: Secret Scan

on:
  workflow_call:
    inputs:
      changed_only:
        required: false
        type: boolean
        default: false
      base_sha:
        required: false
        type: string
        default: ''
      head_sha:
        required: false
        type: string
        default: ''
  workflow_dispatch:

jobs:
  secret-detection-gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      pull-requests: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.30.0/gitleaks_8.30.0_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks

      - name: Verify install
        run: gitleaks version

      - name: Scan
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ inputs.changed_only }}" = "true" ] && [ -n "${{ inputs.base_sha }}" ] && [ -n "${{ inputs.head_sha }}" ] && [ "${{ inputs.base_sha }}" != "0000000000000000000000000000000000000000" ]; then
            gitleaks git . \
              --log-opts "${{ inputs.base_sha }}..${{ inputs.head_sha }}" \
              --report-format sarif \
              --report-path gitleaks-results.sarif \
              --redact \
              --verbose \
              --exit-code 0

            gitleaks git . \
              --log-opts "${{ inputs.base_sha }}..${{ inputs.head_sha }}" \
              --report-format json \
              --report-path gitleaks-results.json \
              --redact \
              --verbose \
              --exit-code 0
          else
            gitleaks dir . \
              --report-format sarif \
              --report-path gitleaks-results.sarif \
              --redact \
              --verbose \
              --exit-code 0

            gitleaks dir . \
              --report-format json \
              --report-path gitleaks-results.json \
              --redact \
              --verbose \
              --exit-code 0
          fi

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('gitleaks-results.sarif') != ''
        with:
          sarif_file: gitleaks-results.sarif
          category: gitleaks

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: secret-detection-gitleaks
          path: |
            gitleaks-results.sarif
            gitleaks-results.json
          retention-days: 30
          if-no-files-found: ignore

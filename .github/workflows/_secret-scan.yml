name: Secret Scan

on:
  workflow_call:
    inputs:
      changed_only:
        required: false
        type: boolean
        default: false
      base_sha:
        required: false
        type: string
        default: ''
      head_sha:
        required: false
        type: string
        default: ''
  workflow_dispatch:

env:
  GITLEAKS_VERSION: "8.30.0"

jobs:
  secret-detection-gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache Gitleaks binary
        id: cache-gitleaks
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/gitleaks
          key: gitleaks-${{ runner.os }}-${{ env.GITLEAKS_VERSION }}

      - name: Install Gitleaks
        if: steps.cache-gitleaks.outputs.cache-hit != 'true'
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks

      - name: Verify install
        run: gitleaks version

      - name: Scan
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ inputs.changed_only }}" = "true" ] && \
             [ -n "${{ inputs.base_sha }}" ] && \
             [ -n "${{ inputs.head_sha }}" ] && \
             [ "${{ inputs.base_sha }}" != "0000000000000000000000000000000000000000" ]; then
            for fmt in sarif json; do
              gitleaks git . \
                --log-opts "${{ inputs.base_sha }}..${{ inputs.head_sha }}" \
                --report-format "$fmt" \
                --report-path "gitleaks-results.$fmt" \
                --redact --verbose --exit-code 0
            done
          else
            for fmt in sarif json; do
              gitleaks dir . \
                --report-format "$fmt" \
                --report-path "gitleaks-results.$fmt" \
                --redact --verbose --exit-code 0
            done
          fi

      - name: Upload results
        if: always()
        uses: ./.github/actions/upload-security-results
        with:
          sarif_path: gitleaks-results.sarif
          json_path: gitleaks-results.json
          category: gitleaks
          artifact_name: secret-detection-gitleaks

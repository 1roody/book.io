name: Deploy

on:
  workflow_call:
    inputs:
      source_image_ref:
        required: true
        type: string
    secrets:
      RENDER_DEPLOY_HOOK_URL:
        required: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy-docker:
    name: Render
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Registry login
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger deploy
        run: |
          curl --fail --silent --show-error \
            --request POST \
            --get \
            --data-urlencode "imgURL=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" \
            "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

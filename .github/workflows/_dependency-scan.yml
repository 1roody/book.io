name: Dependency Scan

on:
  workflow_call:
    inputs:
      changed_only:
        required: false
        type: boolean
        default: false
      base_sha:
        required: false
        type: string
        default: ''
      head_sha:
        required: false
        type: string
        default: ''

jobs:
  dependency-scan:
    name: Trivy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve targets
        id: targets
        uses: ./.github/actions/resolve-changed-targets
        with:
          changed_only: ${{ inputs.changed_only }}
          base_sha: ${{ inputs.base_sha }}
          head_sha: ${{ inputs.head_sha }}
          file_pattern: '(^|/)(package\.json|package-lock\.json|yarn\.lock|pnpm-lock\.yaml|requirements.*\.txt|poetry\.lock|Pipfile(\.lock)?|pom\.xml|build\.gradle(\.kts)?|go\.(mod|sum)|Cargo\.(toml|lock))$'
          default_target: "."

      - name: Trivy fs scan
        if: steps.targets.outputs.mode != 'skip'
        uses: ./.github/actions/trivy-scan
        with:
          command: fs
          targets: ${{ steps.targets.outputs.mode == 'full' && '.' || steps.targets.outputs.targets }}
          output_prefix: trivy-fs-results

      - name: Upload results
        if: always() && steps.targets.outputs.mode != 'skip'
        uses: ./.github/actions/upload-security-results
        with:
          sarif_path: trivy-fs-results.sarif
          json_path: trivy-fs-results.json
          category: trivy-fs
          artifact_name: sca-trivy-fs

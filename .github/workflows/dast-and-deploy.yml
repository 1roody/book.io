name: Deploy & DAST

on:
  workflow_call:
    inputs:
      source_image_ref:
        required: true
        type: string
      target_url:
        required: false
        type: string
        default: ''
      run_dast:
        required: false
        type: boolean
        default: true
    secrets:
      RENDER_DEPLOY_HOOK_URL:
        required: true
  workflow_dispatch:
    inputs:
      source_image_ref:
        description: Image reference published to GHCR
        required: true
        type: string
      target_url:
        description: Public Render URL for the deployed application
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy-docker:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Registry login
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger deploy
        run: |
          curl --fail --silent --show-error \
            --request POST \
            --get \
            --data-urlencode "imgURL=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" \
            "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

  dast-owasp-zap:
    name: OWASP ZAP (${{ matrix.path }})
    if: inputs.run_dast
    needs:
      - deploy-docker
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - path: livros
            name: livros
          - path: segredo
            name: segredo
          - path: "xss?nome=teste"
            name: xss
          - path: "sql?q=teste"
            name: sql
    env:
      TARGET_URL: ${{ inputs.target_url }}
    steps:
      - name: Wait for health
        run: |
          APP_URL="${TARGET_URL%/}"
          for i in {1..30}; do
            if curl -sf "${APP_URL}/health" >/dev/null 2>&1; then
              echo "Application healthy at ${APP_URL}"
              exit 0
            fi
            echo "Waiting for deployed application... ($i/30)"
            sleep 10
          done
          echo "Application did not become healthy in time"
          exit 1

      - name: ZAP full scan
        uses: zaproxy/action-full-scan@v0.12.0
        with:
          target: ${{ env.TARGET_URL }}/${{ matrix.path }}
          allow_issue_writing: false
          artifact_name: dast-zap-${{ matrix.name }}
          cmd_options: "-a -I"

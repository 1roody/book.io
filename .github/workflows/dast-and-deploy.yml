name: Deploy & DAST

on:
  workflow_call:
    inputs:
      source_image_ref:
        required: true
        type: string
      target_url:
        required: false
        type: string
        default: ''
      run_dast:
        required: false
        type: boolean
        default: true
    secrets:
      RENDER_DEPLOY_HOOK_URL:
        required: true
  workflow_dispatch:
    inputs:
      source_image_ref:
        description: Image reference published to GHCR
        required: true
        type: string
      target_url:
        description: Public Render URL for the deployed application
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy-docker:
    name: Deploy Docker Image to Registry
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger Render deploy
        run: |
          curl --fail --silent --show-error \
            --request POST \
            --get \
            --data-urlencode "imgURL=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" \
            "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

  dast-owasp-zap:
    name: DAST - OWASP ZAP
    if: inputs.run_dast
    needs:
      - deploy-docker
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    env:
      TARGET_URL: ${{ inputs.target_url }}
    steps:
      - name: Health check deployed application
        run: |
          APP_URL="${TARGET_URL%/}"
          for i in {1..30}; do
            if curl -sf "${APP_URL}/health" >/dev/null 2>&1; then
              echo "Application healthy at ${APP_URL}"
              exit 0
            fi
            echo "Waiting for deployed application... ($i/30)"
            sleep 10
          done
          echo "Application did not become healthy in time"
          exit 1

      - name: Pull ZAP image
        run: docker pull ghcr.io/zaproxy/zaproxy:stable

      - name: Run OWASP ZAP active scan
        shell: bash
        run: |
          APP_URL="${TARGET_URL%/}"
          mkdir -p zap-output && chmod 777 zap-output
          declare -a TARGETS=(
            "${APP_URL}/livros"
            "${APP_URL}/segredo"
            "${APP_URL}/xss?nome=teste"
            "${APP_URL}/sql?q=teste"
          )

          overall_exit=0
          set +e

          for index in "${!TARGETS[@]}"; do
            target="${TARGETS[$index]}"
            report_prefix="zap-report-$((index + 1))"

            docker run --rm \
              -v "$(pwd)/zap-output:/zap/wrk/:rw" \
              -u root \
              ghcr.io/zaproxy/zaproxy:stable \
              zap-full-scan.py \
                -t "${target}" \
                -r "${report_prefix}.html" \
                -J "${report_prefix}.json" \
                -x "${report_prefix}.sarif" \
                -a \
                -I

            exit_code=$?
            if [ "${exit_code}" -gt "${overall_exit}" ]; then
              overall_exit="${exit_code}"
            fi
          done

          set -e
          echo "overall_exit=${overall_exit}" >> "$GITHUB_OUTPUT"
        id: zap-scan

      - name: Upload ZAP SARIF to GitHub Security Dashboard
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: zap-output/
          category: dast-zap

      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dast-zap-results
          path: |
            zap-output/*.html
            zap-output/*.json
            zap-output/*.sarif
          retention-days: 30
          if-no-files-found: ignore

name: Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-container-scan:
    name: Build and Container Scan
    uses: ./.github/workflows/build-and-container-scan.yml
    permissions:
      contents: read
      packages: write
      security-events: write

  sast:
    name: SAST
    uses: ./.github/workflows/sast.yml
    needs:
      - build-and-container-scan
    permissions:
      contents: read
      security-events: write
      pull-requests: read
      actions: read

  secret-scan:
    name: Secret Scan
    uses: ./.github/workflows/secret-scan.yml
    needs:
      - build-and-container-scan
    permissions:
      contents: read
      security-events: write
      pull-requests: read
      actions: read

  dependency-scan:
    name: Dependency Scan
    uses: ./.github/workflows/dependency-scan.yml
    needs:
      - build-and-container-scan
    permissions:
      contents: read
      security-events: write
      pull-requests: read
      actions: read

  iac:
    name: IaC Security Scan
    uses: ./.github/workflows/iac.yml
    needs:
      - build-and-container-scan
    permissions:
      contents: read
      security-events: write
      pull-requests: read
      actions: read

  deploy-and-dast:
    name: Deploy & DAST
    needs:
      - build-and-container-scan
      - sast
      - secret-scan
      - dependency-scan
      - iac
    uses: ./.github/workflows/dast-and-deploy.yml
    with:
      source_image_ref: ${{ needs.build-and-container-scan.outputs.image_ref }}
      target_url: ${{ vars.RENDER_SERVICE_URL }}
    secrets:
      RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
    permissions:
      contents: read
      packages: write

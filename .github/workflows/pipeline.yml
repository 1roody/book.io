name: CI/CD

on:
  push:
    branches:
      - 'feature/**'
      - main
  pull_request:
    branches:
      - develop
      - main
    types:
      - opened
      - synchronize
      - reopened
      - labeled
      - unlabeled

jobs:
  feature-secret-scan:
    name: Secret Scan
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/feature/')
    uses: ./.github/workflows/secret-scan.yml
    with:
      changed_only: true
      base_sha: ${{ github.event.before }}
      head_sha: ${{ github.sha }}
    permissions:
      contents: read
      security-events: write
      pull-requests: read
      actions: read

  feature-dependency-scan:
    name: Dependency Scan
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/feature/')
    uses: ./.github/workflows/dependency-scan.yml
    with:
      changed_only: true
      base_sha: ${{ github.event.before }}
      head_sha: ${{ github.sha }}
    permissions:
      contents: read
      security-events: write
      pull-requests: read
      actions: read

  develop-sast:
    name: SAST
    if: github.event_name == 'pull_request' && github.base_ref == 'develop'
    uses: ./.github/workflows/sast.yml
    with:
      changed_only: true
      base_sha: ${{ github.event.pull_request.base.sha }}
      head_sha: ${{ github.event.pull_request.head.sha }}
    permissions:
      contents: read
      security-events: write
      pull-requests: read
      actions: read

  develop-secret-scan:
    name: Secret Scan
    if: github.event_name == 'pull_request' && github.base_ref == 'develop'
    uses: ./.github/workflows/secret-scan.yml
    with:
      changed_only: false
    permissions:
      contents: read
      security-events: write
      pull-requests: read
      actions: read

  develop-dependency-scan:
    name: Dependency Scan
    if: github.event_name == 'pull_request' && github.base_ref == 'develop'
    uses: ./.github/workflows/dependency-scan.yml
    with:
      changed_only: true
      base_sha: ${{ github.event.pull_request.base.sha }}
      head_sha: ${{ github.event.pull_request.head.sha }}
    permissions:
      contents: read
      security-events: write
      pull-requests: read
      actions: read

  develop-iac:
    name: IaC
    if: github.event_name == 'pull_request' && github.base_ref == 'develop'
    uses: ./.github/workflows/iac.yml
    with:
      changed_only: true
      base_sha: ${{ github.event.pull_request.base.sha }}
      head_sha: ${{ github.event.pull_request.head.sha }}
    permissions:
      contents: read
      security-events: write
      pull-requests: read
      actions: read

  pr-main-build-and-container-scan:
    name: Build & Container Scan
    if: github.event_name == 'pull_request' && github.base_ref == 'main' && github.head_ref == 'develop'
    uses: ./.github/workflows/build-and-container-scan.yml
    with:
      push_image: false
      run_container_scan: true
    permissions:
      contents: read
      packages: write
      security-events: write

  pr-main-dast:
    name: DAST
    if: github.event_name == 'pull_request' && github.base_ref == 'main' && github.head_ref == 'develop'
    needs:
      - pr-main-build-and-container-scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t bookio-pr-dast:local -f Dockerfile .

      - name: Start container
        run: docker run -d --name bookio-pr-dast -p 3000:3000 bookio-pr-dast:local

      - name: Wait for health
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:3000/health >/dev/null 2>&1; then
              echo "Application healthy at http://localhost:3000"
              exit 0
            fi
            echo "Waiting for local application... ($i/30)"
            sleep 5
          done
          docker logs bookio-pr-dast || true
          exit 1

      - name: Pull ZAP
        run: docker pull ghcr.io/zaproxy/zaproxy:stable

      - name: Run ZAP scan
        shell: bash
        run: |
          mkdir -p zap-output && chmod 777 zap-output
          declare -a TARGETS=(
            "http://host.docker.internal:3000/livros"
            "http://host.docker.internal:3000/segredo"
            "http://host.docker.internal:3000/xss?nome=teste"
            "http://host.docker.internal:3000/sql?q=teste"
          )

          set +e
          for index in "${!TARGETS[@]}"; do
            target="${TARGETS[$index]}"
            report_prefix="zap-report-$((index + 1))"

            docker run --rm \
              --add-host=host.docker.internal:host-gateway \
              -v "$(pwd)/zap-output:/zap/wrk/:rw" \
              -u root \
              ghcr.io/zaproxy/zaproxy:stable \
              zap-full-scan.py \
                -t "${target}" \
                -r "${report_prefix}.html" \
                -J "${report_prefix}.json" \
                -a \
                -I
          done
          set -e

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dast-zap-results
          path: |
            zap-output/*.html
            zap-output/*.json
          retention-days: 30
          if-no-files-found: ignore

      - name: Remove container
        if: always()
        run: docker rm -f bookio-pr-dast || true

  main-build:
    name: Build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/build-and-container-scan.yml
    with:
      push_image: true
      run_container_scan: false
    permissions:
      contents: read
      packages: write
      security-events: write

  main-deploy:
    name: Deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - main-build
    uses: ./.github/workflows/dast-and-deploy.yml
    with:
      source_image_ref: ${{ needs.main-build.outputs.image_ref }}
      target_url: ${{ vars.RENDER_SERVICE_URL }}
      run_dast: true
    secrets:
      RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
    permissions:
      contents: read
      packages: write
      security-events: write

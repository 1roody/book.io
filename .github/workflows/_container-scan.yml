name: Container Scan

on:
  workflow_call:
    inputs:
      image_ref:
        required: true
        type: string
      registry_login:
        required: false
        type: boolean
        default: false

jobs:
  container-scan:
    name: Trivy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Registry login
        if: inputs.registry_login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (cached)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: |
            ${{ inputs.image_ref }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy image scan
        uses: ./.github/actions/trivy-scan
        with:
          command: image
          targets: ${{ inputs.image_ref }}
          output_prefix: trivy-results

      - name: Upload results
        if: always()
        uses: ./.github/actions/upload-security-results
        with:
          sarif_path: trivy-results.sarif
          category: trivy
          artifact_name: container-scan-trivy

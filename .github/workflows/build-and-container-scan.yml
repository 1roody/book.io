name: Build & Container Scan

on:
  workflow_call:
    inputs:
      push_image:
        required: false
        type: boolean
        default: true
      run_container_scan:
        required: false
        type: boolean
        default: true
    outputs:
      image_ref:
        description: Published image reference generated by the build job
        value: ${{ jobs.build-docker.outputs.image_ref }}

jobs:
  build-docker:
    name: Build
    runs-on: ubuntu-latest
    outputs:
      image_ref: ${{ steps.image-ref.outputs.image_ref }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set image ref
        id: image-meta
        run: |
          IMAGE_NAME="$(echo 'ghcr.io/${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          IMAGE_TAG="${IMAGE_NAME}:${{ github.sha }}"
          IMAGE_LATEST="${IMAGE_NAME}:latest"
          echo "image_name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "image_latest=${IMAGE_LATEST}" >> "$GITHUB_OUTPUT"

      - name: Registry login
        if: inputs.push_image
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        id: build-image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ inputs.push_image }}
          load: true
          tags: |
            ${{ steps.image-meta.outputs.image_tag }}
            ${{ steps.image-meta.outputs.image_latest }}

      - name: Export image ref
        id: image-ref
        run: |
          if [ "${{ inputs.push_image }}" = "true" ] && [ -n "${{ steps.build-image.outputs.digest }}" ]; then
            echo "image_ref=${{ steps.image-meta.outputs.image_name }}@${{ steps.build-image.outputs.digest }}" >> "$GITHUB_OUTPUT"
          else
            echo "image_ref=${{ steps.image-meta.outputs.image_tag }}" >> "$GITHUB_OUTPUT"
          fi

  container-scan:
    name: Container Scan
    needs: build-docker
    if: inputs.run_container_scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      packages: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Registry login
        if: inputs.push_image
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: |
            ${{ needs.build-docker.outputs.image_ref }}

      - name: Scan
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "${{ github.workspace }}:/work" \
            -w /work \
            aquasec/trivy:0.69.3 \
            image \
            --image-src docker \
            --severity CRITICAL,HIGH,MEDIUM \
            --format sarif \
            --output trivy-results.sarif \
            "${{ needs.build-docker.outputs.image_ref }}"

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-results.sarif') != ''
        with:
          sarif_file: trivy-results.sarif
          category: trivy

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: container-scan-trivy
          path: trivy-results.sarif
          retention-days: 30
          if-no-files-found: ignore

name: IaC Security Scan

on:
  workflow_call:
    inputs:
      changed_only:
        required: false
        type: boolean
        default: false
      base_sha:
        required: false
        type: string
        default: ''
      head_sha:
        required: false
        type: string
        default: ''
      fail_on_findings:
        required: false
        type: boolean
        default: false
      severities:
        required: false
        type: string
        default: CRITICAL,HIGH,MEDIUM,LOW

jobs:
  iac-trivy-config:
    name: IaC - Trivy Config Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
      actions: read
      pull-requests: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve IaC scan targets
        id: targets
        shell: bash
        run: |
          if [ "${{ inputs.changed_only }}" != "true" ] || [ "${{ inputs.base_sha }}" = "0000000000000000000000000000000000000000" ]; then
            echo "mode=full" >> "$GITHUB_OUTPUT"
            echo "targets=./iac-demo" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          mapfile -t changed_files < <(
            git diff --name-only --diff-filter=ACMR "${{ inputs.base_sha }}" "${{ inputs.head_sha }}" \
              | grep -E '^iac-demo/.*\.(ya?ml|json|tf|tfvars)$' \
              || true
          )

          if [ "${#changed_files[@]}" -eq 0 ]; then
            echo "mode=skip" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          {
            echo "mode=changed"
            echo "targets<<EOF"
            printf '%s\n' "${changed_files[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Run Trivy config scan
        if: steps.targets.outputs.mode != 'skip'
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ steps.targets.outputs.mode }}" = "full" ]; then
            mapfile -t targets < <(printf './iac-demo\n')
          else
            mapfile -t targets < <(printf '%s\n' "${{ steps.targets.outputs.targets }}")
          fi

          docker run --rm \
            -v "${{ github.workspace }}:/work" \
            -w /work \
            aquasec/trivy:0.69.3 \
            config \
            --severity "${{ inputs.severities }}" \
            --format sarif \
            --output trivy-iac-results.sarif \
            "${targets[@]}"

          docker run --rm \
            -v "${{ github.workspace }}:/work" \
            -w /work \
            aquasec/trivy:0.69.3 \
            config \
            --severity "${{ inputs.severities }}" \
            --format json \
            --output trivy-iac-results.json \
            "${targets[@]}"

      - name: Enforce Trivy IaC policy
        if: steps.targets.outputs.mode != 'skip' && inputs.fail_on_findings
        run: |
          findings_count="$(jq '[.Results[]?.Misconfigurations[]?] | length' trivy-iac-results.json)"
          if [ "${findings_count}" -gt 0 ]; then
            echo "Blocking due to ${findings_count} IaC finding(s) at severities ${{ inputs.severities }}."
            exit 1
          fi

      - name: Upload Trivy IaC SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-iac-results.sarif') != ''
        with:
          sarif_file: trivy-iac-results.sarif
          category: trivy-iac

      - name: Upload Trivy IaC reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: iac-trivy-config
          path: |
            trivy-iac-results.sarif
            trivy-iac-results.json
          retention-days: 30
          if-no-files-found: ignore

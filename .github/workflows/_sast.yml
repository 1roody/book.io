name: SAST

on:
  workflow_call:
    inputs:
      changed_only:
        required: false
        type: boolean
        default: false
      base_sha:
        required: false
        type: string
        default: ''
      head_sha:
        required: false
        type: string
        default: ''

jobs:
  sast-semgrep:
    name: Semgrep
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve targets
        id: targets
        uses: ./.github/actions/resolve-changed-targets
        with:
          changed_only: ${{ inputs.changed_only }}
          base_sha: ${{ inputs.base_sha }}
          head_sha: ${{ inputs.head_sha }}
          default_target: "."

      - name: Cache Semgrep
        if: steps.targets.outputs.mode != 'skip'
        uses: actions/cache@v4
        with:
          path: ~/.semgrep
          key: semgrep-${{ runner.os }}-${{ hashFiles('**/.semgrepignore', '**/.semgrep.yml') }}
          restore-keys: |
            semgrep-${{ runner.os }}-

      - name: Install Semgrep
        if: steps.targets.outputs.mode != 'skip'
        run: python3 -m pip install --quiet semgrep

      - name: Scan
        if: steps.targets.outputs.mode != 'skip'
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ steps.targets.outputs.mode }}" = "full" ]; then
            semgrep scan --config auto --sarif --output semgrep-results.sarif
            semgrep scan --config auto --json --output semgrep-results.json
          else
            mapfile -t targets <<< "${{ steps.targets.outputs.targets }}"
            semgrep scan --config auto --sarif --output semgrep-results.sarif "${targets[@]}"
            semgrep scan --config auto --json --output semgrep-results.json "${targets[@]}"
          fi

      - name: Upload results
        if: always() && steps.targets.outputs.mode != 'skip'
        uses: ./.github/actions/upload-security-results
        with:
          sarif_path: semgrep-results.sarif
          json_path: semgrep-results.json
          category: semgrep
          artifact_name: sast-semgrep

name: DAST

on:
  workflow_call:
    inputs:
      target_url:
        required: true
        type: string
        description: Base URL to scan (e.g. http://localhost:3000 or deployed URL)
      build_local_image:
        required: false
        type: boolean
        default: false
        description: If true, build the Dockerfile locally and run a container before scanning
  workflow_dispatch:
    inputs:
      target_url:
        description: Base URL to scan
        required: true
        type: string

jobs:
  dast-owasp-zap:
    name: OWASP ZAP (${{ matrix.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - path: livros
            name: livros
          - path: segredo
            name: segredo
          - path: "xss?nome=teste"
            name: xss
          - path: "sql?q=teste"
            name: sql
    env:
      TARGET_URL: ${{ inputs.target_url }}
      ZAP_REPORT_JSON: zap-report-${{ matrix.name }}.json
      ZAP_SARIF: zap-report-${{ matrix.name }}.sarif
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build local image
        if: inputs.build_local_image
        run: docker build -t bookio-dast:local -f Dockerfile .

      - name: Start local container
        if: inputs.build_local_image
        run: docker run -d --name bookio-dast-${{ matrix.name }} -p 3000:3000 bookio-dast:local

      - name: Wait for health
        run: |
          APP_URL="${TARGET_URL%/}"
          for i in {1..30}; do
            if curl -sf "${APP_URL}/health" >/dev/null 2>&1; then
              echo "Application healthy at ${APP_URL}"
              exit 0
            fi
            echo "Waiting for application... ($i/30)"
            sleep 10
          done
          echo "Application did not become healthy in time"
          exit 1

      - name: ZAP full scan
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/zap/wrk/:rw" \
            -u root \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-full-scan.py \
              -t "${{ env.TARGET_URL }}/${{ matrix.path }}" \
              -J "${{ env.ZAP_REPORT_JSON }}" \
              -a -I
        continue-on-error: true

      - name: Convert ZAP JSON to SARIF
        if: always()
        run: |
          python3 << 'EOF'
          import json, os, sys

          report_path = os.environ["ZAP_REPORT_JSON"]
          sarif_path  = os.environ["ZAP_SARIF"]

          if not os.path.exists(report_path):
              print(f"Report not found: {report_path}")
              sys.exit(0)

          with open(report_path) as f:
              data = json.load(f)

          rules, results = [], []
          seen_rules = set()

          for site in data.get("site", []):
              for alert in site.get("alerts", []):
                  rule_id = alert["pluginid"]
                  risk    = int(alert.get("riskcode", 0))
                  level   = {3: "error", 2: "warning", 1: "note"}.get(risk, "note")

                  if rule_id not in seen_rules:
                      seen_rules.add(rule_id)
                      rules.append({
                          "id": rule_id,
                          "name": alert["name"].replace(" ", ""),
                          "shortDescription": {"text": alert["name"]},
                          "fullDescription":  {"text": alert.get("desc", alert["name"])},
                          "helpUri": alert.get("reference", "https://www.zaproxy.org/"),
                          "properties": {"security-severity": str(risk * 2.5)},
                      })

                  for instance in alert.get("instances", []):
                      uri = instance.get("uri", site.get("@name", ""))
                      results.append({
                          "ruleId":  rule_id,
                          "level":   level,
                          "message": {"text": alert["name"] + ": " + instance.get("evidence", "")},
                          "locations": [{
                              "physicalLocation": {
                                  "artifactLocation": {"uri": uri, "uriBaseId": "%SRCROOT%"},
                                  "region": {"startLine": 1},
                              }
                          }],
                      })

          sarif = {
              "$schema": "https://json.schemastore.org/sarif-2.1.0.json",
              "version": "2.1.0",
              "runs": [{
                  "tool": {"driver": {"name": "OWASP ZAP", "version": "stable", "rules": rules}},
                  "results": results,
              }],
          }

          with open(sarif_path, "w") as f:
              json.dump(sarif, f, indent=2)

          print(f"SARIF written: {len(results)} results, {len(rules)} rules")
          EOF

      - name: Upload SARIF to GitHub Security Dashboard
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ env.ZAP_SARIF }}
          category: zap-${{ matrix.name }}

      - name: Remove local container
        if: always() && inputs.build_local_image
        run: docker rm -f bookio-dast-${{ matrix.name }} || true

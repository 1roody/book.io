name: IaC

on:
  workflow_call:
    inputs:
      changed_only:
        required: false
        type: boolean
        default: false
      base_sha:
        required: false
        type: string
        default: ''
      head_sha:
        required: false
        type: string
        default: ''

jobs:
  iac-trivy-config:
    name: Trivy Config
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve targets
        id: targets
        uses: ./.github/actions/resolve-changed-targets
        with:
          changed_only: ${{ inputs.changed_only }}
          base_sha: ${{ inputs.base_sha }}
          head_sha: ${{ inputs.head_sha }}
          file_pattern: '^iac-demo/.*\.(ya?ml|json|tf|tfvars)$'
          default_target: "./iac-demo"

      - name: Trivy config scan
        if: steps.targets.outputs.mode != 'skip'
        uses: ./.github/actions/trivy-scan
        with:
          command: config
          targets: ${{ steps.targets.outputs.mode == 'full' && './iac-demo' || steps.targets.outputs.targets }}
          severity: "CRITICAL,HIGH"
          output_prefix: trivy-iac-results

      - name: Upload results
        if: always() && steps.targets.outputs.mode != 'skip'
        uses: ./.github/actions/upload-security-results
        with:
          sarif_path: trivy-iac-results.sarif
          json_path: trivy-iac-results.json
          category: trivy-iac
          artifact_name: iac-trivy-config

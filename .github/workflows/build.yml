name: Build

on:
  workflow_call:
    inputs:
      push-image:
        required: true
        type: boolean
        default: false
    outputs:
      image_ref:
        description: Docker image reference generated by the build job
        value: ${{ jobs.build-docker.outputs.image_ref }}

jobs:
  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    outputs:
      image_ref: ${{ steps.image-ref.outputs.image_ref }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Define image reference
        id: image-meta
        run: |
          IMAGE_NAME="$(echo 'ghcr.io/${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          IMAGE_TAG="${IMAGE_NAME}:${{ github.sha }}"
          echo "image_name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Log in to Container Registry
        if: inputs.push-image
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        id: build-image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ inputs.push-image }}
          tags: ${{ steps.image-meta.outputs.image_tag }}

      - name: Export canonical image reference
        id: image-ref
        run: |
          if [ -n "${{ steps.build-image.outputs.digest }}" ]; then
            echo "image_ref=${{ steps.image-meta.outputs.image_name }}@${{ steps.build-image.outputs.digest }}" >> "$GITHUB_OUTPUT"
          else
            echo "image_ref=${{ steps.image-meta.outputs.image_tag }}" >> "$GITHUB_OUTPUT"
          fi

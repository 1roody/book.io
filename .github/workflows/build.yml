name: Build

on:
  workflow_call:
    inputs:
      image-ref:
        required: false
        type: string
        default: ""
      push-image:
        required: true
        type: boolean
        default: false

jobs:
  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve image reference
        id: image
        env:
          INPUT_IMAGE_REF: ${{ inputs.image-ref }}
        run: |
          if [ -n "${INPUT_IMAGE_REF}" ]; then
            IMAGE_REF="${INPUT_IMAGE_REF}"
          else
            REPOSITORY_LOWER=$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')
            IMAGE_REF="ghcr.io/${REPOSITORY_LOWER}:${GITHUB_SHA}"
          fi

          echo "image_ref=${IMAGE_REF}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: inputs.push-image
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ inputs.push-image }}
          tags: ${{ steps.image.outputs.image_ref }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
